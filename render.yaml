services:
  - type: web
    name: harbor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # set in the Render dashboard, never in git
      - key: HARBOR_HASH_SALT
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.6
